name: 🚀 Déploiement automatique sur LWS

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout du code
        uses: actions/checkout@v4

      - name: 🚀 Déploiement via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_PATH }}
          local-dir: ./
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**

      - name: 📥 Installer lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: 🔽 Télécharger /webdata/dev/public
        run: |
          mkdir -p _tmp_data_public
          lftp -e "
            open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ${{ secrets.FTP_SERVER }};
            mirror --verbose /webdata/dev/public ./_tmp_data_public;
            quit
          "

      - name: 🧹 Retirer index.php
        run: rm -f ./_tmp_data_public/index.php

      - name: 📤 Upload vers /public_html/dev/
        run: |
          lftp -e "
            open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ${{ secrets.FTP_SERVER }};
            mirror --reverse --verbose ./_tmp_data_public /public_html/dev;
            quit
          "
